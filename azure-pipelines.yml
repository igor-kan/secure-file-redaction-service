trigger:
  branches:
    include:
      - main

pr:
  branches:
    include:
      - main

stages:
  - stage: Validate
    jobs:
      - job: Backend
        pool:
          vmImage: ubuntu-latest
        steps:
          - task: UsePythonVersion@0
            inputs:
              versionSpec: '3.11'
          - script: |
              cd backend
              python -m pip install --upgrade pip
              pip install -r requirements.txt
              pytest -q
            displayName: Test FastAPI backend

      - job: Frontend
        pool:
          vmImage: ubuntu-latest
        steps:
          - task: NodeTool@0
            inputs:
              versionSpec: '20.x'
          - script: |
              cd web
              npm ci
              npm run build
            displayName: Build React frontend
